<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Paunam Khenna</title>
<script src="brand.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen" style="display:none">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-title">Admin Panel</div>
      <div class="login-sub">Sign in with your authorised Google account</div>
      <button class="btn btn-gold" id="googleSignInBtn" onclick="signInWithGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%">
        <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
      <div class="error-msg" id="loginError" style="margin-top:14px"></div>
    </div>
  </div>
</div>

<!-- ── ADMIN ── -->
<div id="adminMain" style="display:none">
  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo" id="adminSidebarLogo">Paunam Khenna</div>
        <div class="sidebar-title">Admin Panel</div>
        <div class="sidebar-sub">Content Editor</div>
      </div>

      <div class="nav-label-small">Levels &amp; Lessons</div>
      <div id="levelNav"></div>

      <div style="border-top:1px solid var(--border);margin-top:auto">
        <button class="str-nav-btn" id="settingsNavBtn" onclick="showSettings('structure')">
          <span>⚙</span><span>Settings</span>
        </button>
        <button class="analytics-nav-btn" id="analyticsNavBtn" onclick="showAnalytics()">
          <span>📊</span><span>Analytics</span>
        </button>
        <button class="analytics-nav-btn" id="leaderboardNavBtn" onclick="showAdminLeaderboard()">
          <span>🏆</span><span>Leaderboard</span>
        </button>
        <button class="analytics-nav-btn" id="referenceNavBtn" onclick="showReferenceAdmin()">
          <span>≡</span><span>Grammar Reference</span>
        </button>
        <button class="analytics-nav-btn" id="resourcesNavBtn" onclick="showResourcesAdmin()">
          <span>📎</span><span>Appendix</span>
        </button>
      </div>

      <div class="sidebar-bottom">
        <button class="btn btn-outline" onclick="exportData()" style="font-size:12px;padding:7px 12px">↓ Export JSON</button>
        <label class="btn btn-outline" style="font-size:12px;padding:7px 12px;cursor:pointer;text-align:center">
          ↑ Import JSON
          <input type="file" accept=".json" style="display:none" onchange="importData(this)">
        </label>
        <button class="btn btn-red" onclick="logout()" style="font-size:12px;padding:7px 12px">Sign Out</button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-crumb" id="topCrumb">Select a level and lesson from the sidebar</div>
        <div class="topbar-actions">
          <a href="index.html" target="_blank"
            class="btn btn-outline" style="font-size:12px;padding:6px 14px;text-decoration:none">↗ View App</a>
        </div>
      </div>

      <div class="admin-content" id="adminContent">
        <div class="placeholder">
          <div class="placeholder-icon">◈</div>
          <div class="placeholder-text">Select a level and lesson from the sidebar to begin editing</div>
        </div>
      </div>

      <div class="save-bar" id="saveBar" style="display:none">
        <button class="btn btn-outline" onclick="discardChanges()">Discard</button>
        <button class="btn btn-gold" onclick="saveChanges()">Save Changes</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="admin.js"></script>
</body>
</html>
